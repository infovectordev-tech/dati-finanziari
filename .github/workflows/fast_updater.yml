name: Fast Price Updater

on:
  schedule:
    - cron: '0 */4 * * *' # Prova a partire ogni 4 ore esatte
  workflow_dispatch:

# --- LA MAGIA È QUI ---
# Garantisce che ci sia sempre e solo UN worker acceso alla volta
concurrency:
  group: live-price-updater
  cancel-in-progress: true 

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          pip install requests supabase

      - name: Esegui Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -u scripts/fast_updater.py
