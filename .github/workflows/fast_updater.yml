name: Fast Price Updater

on:
  schedule:
    - cron: '0 */4 * * *' # Parte ogni 4 ore esatte per sovrapporsi allo script
  workflow_dispatch:

# Garantisce che ci sia sempre e solo UN worker acceso alla volta
concurrency:
  group: live-price-updater
  cancel-in-progress: true 

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔥 AGGIORNATO: Rimuoviamo supabase e inseriamo boto3
      - name: Installa Dipendenze
        run: |
          pip install requests boto3

      # 🔥 AGGIORNATO: Passiamo allo script i segreti di Cloudflare R2
      - name: Esegui Updater
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python -u scripts/fast_updater.py
