name: Aggiornamento Prezzi 30s (Fast Loop)

on:
  schedule:
    # Esegui ogni 15 minuti esatti
    - cron: '*/17 * * * *'
  workflow_dispatch:

jobs:
  run-fast-updater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installiamo solo le librerie leggere necessarie per i prezzi
          pip install --no-cache-dir yfinance==0.2.63 pandas supabase

      - name: Run Fast Updater Loop
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/fast_updater.py
